# fly.toml — generated for movie-database Laravel app
# Replace 'your-app-name' with your actual Fly.io app name (from `fly launch`)
app = "your-app-name"
primary_region = "sin"

[build]
  # Uses the Dockerfile at the project root

[deploy]
  # Runs in a temporary VM before rolling out the new version.
  # Handles database migrations safely.
  release_command = "php artisan migrate --force"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Non-sensitive environment variables.
# Sensitive values (APP_KEY, DB_*, REDIS_URL, etc.) must be set via:
#   fly secrets set KEY="value"
[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "error"
  DB_CONNECTION = "mysql"
  CACHE_DRIVER = "redis"
  SESSION_DRIVER = "redis"
  QUEUE_CONNECTION = "redis"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# ── Required secrets (run these once) ─────────────────────────────────────────
# fly secrets set APP_KEY="base64:..."
# fly secrets set DB_HOST="..."
# fly secrets set DB_PORT="3306"
# fly secrets set DB_DATABASE="..."
# fly secrets set DB_USERNAME="..."
# fly secrets set DB_PASSWORD="..."
# fly secrets set REDIS_URL="redis://..."      (or REDIS_HOST / REDIS_PASSWORD)
# fly secrets set MEILISEARCH_HOST="..."
# fly secrets set MEILISEARCH_KEY="..."
# fly secrets set CLOUDINARY_URL="..."
# fly secrets set TMDB_API_KEY="..."
